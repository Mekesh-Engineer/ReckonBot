<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<meta name="description" content="{{ meta_description|default('FlowGateX Intelligent Gateway Control Dashboard') }}">

<!-- Preconnects -->
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Tailwind Play CDN -->
<script>
    // Tailwind config must be declared BEFORE the CDN script executes (or immediately after in Play mode)
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
        darkMode: 'class', // switch using <html class="dark">
        theme: {
            extend: {
                fontFamily: {
                    sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif']
                },
                colors: {
                    brand: {
                        DEFAULT: '#2563eb',
                        foreground: '#ffffff',
                        dark: '#1e3a8a'
                    },
                    surface: {
                        light: '#f8fafc',
                        dark: '#0f172a'
                    }
                },
                spacing: {
                    'layout-gutter': '1.25rem'
                },
                borderRadius: {
                    'xl': '1rem'
                }
            }
        },
        corePlugins: {
            container: true
        }
    };
</script>
<script src="https://cdn.tailwindcss.com"></script>

<!-- Optional: small runtime utility for dark mode persistence -->
<script>
    (function () {
        const cls = 'dark';
        const root = document.documentElement;
        const stored = localStorage.getItem('theme');
        if (stored) {
            if (stored === 'dark') root.classList.add(cls);
        } else {
            if (window.matchMedia('(prefers-color-scheme: dark)').matches)
                root.classList.add(cls);
        }
    })();
</script>

<!-- Global CSS (overrides / complements Tailwind) -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
