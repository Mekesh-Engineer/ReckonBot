<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { 
        fill: #ffffff; 
        stroke: #343a40; 
        stroke-width: 2; 
        rx: 10; 
      }
      .title { 
        font-family: system-ui, -apple-system, sans-serif; 
        font-size: 20px; 
        font-weight: bold; 
        fill: #212529; 
        text-anchor: middle; 
      }
      .subtitle { 
        font-family: system-ui, -apple-system, sans-serif; 
        font-size: 15px; 
        fill: #495057; 
        text-anchor: middle; 
      }
      .desc { 
        font-family: system-ui, -apple-system, sans-serif; 
        font-size: 13px; 
        fill: #6c757d; 
        text-anchor: middle; 
      }
      .arrow { 
        stroke: #343a40; 
        stroke-width: 2; 
        fill: none; 
      }
      .label-bg { 
        fill: #ffffff;
      }
      .label-text { 
        font-family: system-ui, -apple-system, sans-serif; 
        font-size: 13px; 
        font-weight: 600; 
        fill: #343a40; 
        text-anchor: middle; 
      }
    </style>
    <marker id="arrow-end" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#343a40" />
    </marker>
    <marker id="arrow-start" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#343a40" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="3" result="offsetblur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect class="box" x="50" y="50" width="280" height="130"/>
    <text class="title" x="190" y="90">Bot 1</text>
    <text class="subtitle" x="190" y="120">ESP32-CAM Unit</text>
    <line x1="70" y1="135" x2="310" y2="135" stroke="#e9ecef"/>
    <text class="desc" x="190" y="160">Vision &amp; Local Sensors</text>
    
    <rect class="box" x="470" y="50" width="280" height="130"/>
    <text class="title" x="610" y="90">Bot 2</text>
    <text class="subtitle" x="610" y="120">Sensor Array Unit</text>
    <line x1="490" y1="135" x2="730" y2="135" stroke="#e9ecef"/>
    <text class="desc" x="610" y="160">Environmental Sensors</text>
    
    <rect class="box" x="240" y="320" width="320" height="110"/>
    <text class="title" x="400" y="360">WiFi Gateway</text>
    <text class="subtitle" x="400" y="390">Data Aggregator</text>
    
    <rect class="box" x="240" y="520" width="320" height="120"/>
    <text class="title" x="400" y="560">Backend</text>
    <text class="subtitle" x="400" y="585">Flask Server &amp; DB</text>
    <line x1="260" y1="600" x2="540" y2="600" stroke="#e9ecef"/>
    <text class="desc" x="400" y="620">Processing & Storage</text>
    
    <rect class="box" x="240" y="730" width="320" height="110"/>
    <text class="title" x="400" y="770">User Interface</text>
    <text class="subtitle" x="400" y="800">Web & Mobile Dashboard</text>
  </g>

  <g>
    <path class="arrow" d="M 330 115 H 470" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
    <rect class="label-bg" x="355" y="104" width="90" height="22"/>
    <text class="label-text" x="400" y="120">ESP-NOW</text>
    
    <path class="arrow" d="M 190 180 V 250 H 400 V 320" marker-end="url(#arrow-end)"/>
    <path class="arrow" d="M 610 180 V 250 H 400" marker-end="url(#arrow-end)"/>
    <rect class="label-bg" x="355" y="260" width="90" height="22"/>
    <text class="label-text" x="400" y="276">WiFi Data</text>
    
    <path class="arrow" d="M 400 430 V 520" marker-end="url(#arrow-end)"/>
    <rect class="label-bg" x="355" y="465" width="90" height="22"/>
    <text class="label-text" x="400" y="481">REST API</text>
    
    <path class="arrow" d="M 400 640 V 730" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
    <rect class="label-bg" x="345" y="675" width="110" height="22"/>
    <text class="label-text" x="400" y="691">WebSocket</text>
  </g>
</svg>